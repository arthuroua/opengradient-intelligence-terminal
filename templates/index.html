<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Intelligence Terminal</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.header{
text-align:center;
padding:40px;
font-size:36px;
}

.terminal{
max-width:900px;
margin:auto;
background:#0b0f1a;
padding:20px;
border-radius:10px;
}

.status{
padding:10px;
margin-bottom:20px;
color:#9bb3c9;
}

.model{
border-bottom:1px solid #1a2333;
padding:18px;
}

.name{
font-size:20px;
color:white;
}

.description{
color:#9bb3c9;
margin-top:5px;
}

button{
margin-top:10px;
background:#00f2ff;
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.code{
display:none;
background:#04060c;
padding:10px;
margin-top:10px;
white-space:pre;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
OpenGradient Intelligence Terminal
</div>

<div class="terminal">

<div id="status" class="status">
Connecting to Model Hub...
</div>

<div class="model">

<div class="name">Run OpenGradient SDK</div>

<div class="description">
Generate example code for running inference
</div>

<button onclick="generate('Meta-Llama-3-8B-Instruct','code1')">
Generate SDK Command
</button>

<div class="code" id="code1"></div>

</div>

<div class="model">

<div class="name">Run Finance Model</div>

<div class="description">
Example for ETH volatility predictor
</div>

<button onclick="generate('ETH Volatility Predictor','code2')">
Generate SDK Command
</button>

<div class="code" id="code2"></div>

</div>

</div>

<script>

async function loadModels(){

try{

let res = await fetch("/models")

let data = await res.json()

if(data.status==="ok"){

document.getElementById("status").innerText="Connected to OpenGradient Model Hub"

}else{

document.getElementById("status").innerText="Model Hub connection failed"

}

}catch(e){

document.getElementById("status").innerText="Could not connect to Model Hub"

}

}

function generate(model,id){

let code=`pip install opengradient

import opengradient as og

llm = og.LLM(private_key="YOUR_PRIVATE_KEY")

response = llm.chat(
model="${model}",
messages=[{"role":"user","content":"Hello"}]
)

print(response)
`

let box=document.getElementById(id)

box.style.display="block"

box.innerText=code

}

loadModels()

</script>

</body>

</html>
