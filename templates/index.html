<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Intelligence Terminal</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.header{
text-align:center;
padding:40px;
font-size:36px;
}

.terminal{
max-width:900px;
margin:auto;
background:#0b0f1a;
padding:20px;
border-radius:10px;
}

.model{
border-bottom:1px solid #1a2333;
padding:18px;
}

.name{
font-size:20px;
color:white;
}

.description{
color:#9bb3c9;
margin-top:5px;
}

button{
margin-top:10px;
background:#00f2ff;
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.code{
display:none;
background:#04060c;
padding:10px;
margin-top:10px;
white-space:pre;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
OpenGradient Intelligence Terminal
</div>

<div class="terminal" id="models">

Loading models...

</div>

<script>

async function loadModels(){

try{

let res = await fetch(
"https://hub.opengradient.ai/models?page=0&limit=10&sort_by=most_likes"
)

let html = await res.text()

let container=document.getElementById("models")

container.innerHTML="Model Hub connected"

}catch(e){

document.getElementById("models").innerHTML="Could not load models"

}

}

function generate(model,id){

let code=`pip install opengradient

import opengradient as og

llm = og.LLM(private_key="YOUR_PRIVATE_KEY")

response = llm.chat(
model="${model}",
messages=[{"role":"user","content":"Hello"}]
)

print(response)
`

let box=document.getElementById(id)

box.style.display="block"

box.innerText=code

}

loadModels()

</script>

</body>

</html>
