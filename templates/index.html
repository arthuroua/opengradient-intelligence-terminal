<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Intelligence Terminal</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
overflow-x:hidden;
}

/* grid */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
linear-gradient(#00f2ff22 1px,transparent 1px),
linear-gradient(90deg,#00f2ff22 1px,transparent 1px);
background-size:60px 60px;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{transform:translate(0,0)}
to{transform:translate(-60px,-60px)}
}

.header{
text-align:center;
padding:40px;
font-size:36px;
font-weight:bold;
background:linear-gradient(90deg,#00f2ff,#8a2eff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
}

.stat{
background:#0b0f1a;
padding:12px 20px;
border-radius:10px;
box-shadow:0 0 20px #00f2ff55;
}

.terminal{
max-width:900px;
margin:auto;
background:#0b0f1a;
border-radius:10px;
padding:20px;
box-shadow:0 0 30px #00f2ff22;
}

.model{
border-bottom:1px solid #1a2333;
padding:18px;
}

.name{
font-size:20px;
color:white;
}

.category{
font-size:13px;
color:#00f2ff;
}

.description{
margin-top:6px;
color:#9bb3c9;
}

.cap{
display:inline-block;
background:#141a2b;
padding:4px 8px;
border-radius:6px;
margin-right:5px;
margin-top:6px;
font-size:12px;
}

button{
margin-top:10px;
background:linear-gradient(90deg,#00f2ff,#8a2eff);
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.code{
display:none;
background:#04060c;
margin-top:10px;
padding:10px;
border-radius:6px;
white-space:pre;
}

.signal{
margin-top:8px;
font-size:13px;
}

.feed{
margin-top:30px;
background:#04060c;
padding:15px;
border-radius:8px;
max-height:200px;
overflow:auto;
font-size:13px;
}

</style>

</head>
